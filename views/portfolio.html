<!-- ======= Portfolio Section ======= -->
<section id="portfolio" class="portfolio">
    <div class="container">

        <div class="section-title">
            <h2>Portfolio</h2>
            <p>Mes réalisations</p>
        </div>

        <div class="row portfolio-container">
            <div ng-repeat="project in projects" class="col-lg-4 col-md-6 portfolio-item" ng-if="project.name != 'Home' && project.name != 'julienbouze'">
                <div>
                    <h4 class="project">{{ replaceDashes(project.name) }}</h4>
                    <p>{{ project.description }}</p>
                    <a href="{{ project.html_url }}" target="_blank" class="badge rounded-pill p-2 mb-2 d-inline-block mx-1 project-pill">Repo
                    </a>
                    <a href="{{ project.homepage }}" target="_blank" ng-if="project.homepage != null || project.homepage != ''" class="badge rounded-pill p-2 mb-2 d-inline-block mx-1 project-pill">Page
                    </a>
                </div>
            </div>

        </div>

    </div>
</section><!-- End Portfolio Section -->
